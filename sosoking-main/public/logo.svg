<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="소소킹 판결소 로고">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202742"/>
      <stop offset="0.55" stop-color="#161b2e"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1d88a"/>
      <stop offset="0.52" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#9a7018"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="200" height="200" rx="42" fill="url(#bg)"/>
  <rect x="10" y="10" width="180" height="180" rx="34" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.55"/>
  <rect x="18" y="18" width="164" height="164" rx="28" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.22"/>

  <!-- court paper -->
  <g filter="url(#softShadow)">
    <rect x="55" y="42" width="90" height="118" rx="10" fill="#f5f0e8"/>
    <rect x="67" y="60" width="66" height="4" rx="2" fill="#c9a84c" opacity="0.75"/>
    <rect x="70" y="75" width="60" height="3" rx="1.5" fill="#161b2e" opacity="0.28"/>
    <rect x="70" y="86" width="48" height="3" rx="1.5" fill="#161b2e" opacity="0.22"/>
    <rect x="70" y="97" width="56" height="3" rx="1.5" fill="#161b2e" opacity="0.22"/>
  </g>

  <!-- tilted scale -->
  <g transform="translate(100 104) rotate(-10)">
    <rect x="-5" y="-8" width="10" height="60" rx="5" fill="url(#gold)"/>
    <rect x="-34" y="46" width="68" height="10" rx="5" fill="url(#gold)"/>
    <line x1="-58" y1="-10" x2="58" y2="-10" stroke="url(#gold)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-10" r="9" fill="#f1d88a" stroke="#161b2e" stroke-width="2"/>

    <line x1="-48" y1="-8" x2="-56" y2="22" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <line x1="-68" y1="-8" x2="-56" y2="22" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-56" cy="28" rx="28" ry="8" fill="#e8c97a"/>
    <text x="-56" y="31" text-anchor="middle" font-size="10" font-family="Noto Sans KR, sans-serif" font-weight="900" fill="#161b2e">억울</text>

    <line x1="48" y1="-8" x2="56" y2="12" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="68" y1="-8" x2="56" y2="12" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <ellipse cx="56" cy="18" rx="22" ry="6" fill="#c9a84c" opacity="0.42"/>
    <text x="56" y="21" text-anchor="middle" font-size="12" font-family="sans-serif" font-weight="900" fill="#c9a84c" opacity="0.72">?</text>
  </g>

  <!-- stamp -->
  <g transform="translate(135 139) rotate(-13)">
    <rect x="-27" y="-17" width="54" height="34" rx="4" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <text x="0" y="7" text-anchor="middle" font-size="18" font-family="Noto Serif KR, serif" font-weight="900" fill="#e74c3c" letter-spacing="3">판결</text>
  </g>

  <!-- sweat / comedy details -->
  <path d="M149 54 C149 54 155 42 160 47 C164 52 156 61 149 54Z" fill="#4dabf7" opacity="0.9"/>
  <path d="M164 67 C164 67 168 60 171 63 C174 67 169 72 164 67Z" fill="#4dabf7" opacity="0.65"/>
  <text x="43" y="42" font-size="18" font-family="sans-serif" font-weight="900" fill="#e74c3c" opacity="0.85">!!</text>
</svg>
