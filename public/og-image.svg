      <text x="0" y="10" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-size="36" font-weight="900" fill="#c9a84c">?</text>
    </g>
  </g>

  <text x="600" y="310" text-anchor="middle" font-family="Noto Serif KR, Apple SD Gothic Neo, Malgun Gothic, serif" font-size="84" font-weight="900" fill="url(#gold)" letter-spacing="1">소소킹 황당재판소</text>
  <text x="600" y="366" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="28" font-weight="700" fill="#f5f0e8" opacity="0.86">이런 일로 재판까지 가야 하냐고요? 네, 소소킹에서는 갑니다.</text>
  <text x="600" y="407" text-anchor="middle" font-family="Noto Sans KR, Apple SD Gothic Neo, Malgun Gothic, sans-serif" font-size="18" fill="#f5f0e8" opacity="0.48">사소한 억울함 · 황당판결 · 생활형 처분 · 법적효력 0%</text>

  <g transform="translate(600 472)">
    <rect x="-300" y="-24" width="148" height="48" rx="24" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.5"/>
    <text x="-226" y="7" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="17" fill="#c9a84c" font-weight="900">사건번호 발급</text>
    <rect x="-130" y="-24" width="140" height="48" rx="24" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.5"/>
    <text x="-60" y="7" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="17" fill="#c9a84c" font-weight="900">증거 아닌 증거</text>
    <rect x="32" y="-24" width="130" height="48" rx="24" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.5"/>
    <text x="97" y="7" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="17" fill="#c9a84c" font-weight="900">황당판결</text>
    <rect x="184" y="-24" width="116" height="48" rx="24" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.5"/>
    <text x="242" y="7" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="17" fill="#c9a84c" font-weight="900">무료</text>
  </g>

  <text x="600" y="560" text-anchor="middle" font-family="Noto Sans KR, monospace, sans-serif" font-size="18" fill="#c9a84c" opacity="0.58" letter-spacing="2">sosoking.co.kr</text>
  <text x="600" y="585" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="12" fill="#f5f0e8" opacity="0.26" letter-spacing="3">ABSURD AI VERDICT COURT</text>
