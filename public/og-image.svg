<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="소소킹 황당재판소 공유 이미지">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0" stop-color="#26314f"/>
      <stop offset="50" stop-color="#151b2d"/>
      <stop offset="100%" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe8a8"/>
      <stop offset="52%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8d641e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="58%">
      <stop offset="0" stop-color="#c9a84c" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="310" rx="470" ry="265" fill="url(#glow)"/>

  <rect x="34" y="34" width="1132" height="562" rx="32" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.68"/>
  <rect x="54" y="54" width="1092" height="522" rx="24" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g transform="translate(600 136)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="78" fill="rgba(255,255,255,0.04)" stroke="#c9a84c" stroke-width="2.5" opacity="0.8"/>
    <g transform="rotate(-13)">
      <rect x="-10" y="-50" width="20" height="112" rx="10" fill="url(#gold)"/>
      <rect x="-58" y="50" width="116" height="20" rx="10" fill="url(#gold)"/>
      <rect x="-76" y="-76" width="152" height="28" rx="14" fill="url(#gold)"/>
      <circle cx="0" cy="-62" r="16" fill="#f7e4a3" stroke="#151b2d" stroke-width="4"/>
    </g>
    <g transform="translate(92 -58)">
