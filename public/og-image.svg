<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8c97a"/>
      <stop offset="50%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c97a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#c9a84c" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="290" rx="520" ry="300" fill="url(#glow)"/>

  <!-- Border frame -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>

  <!-- Corner accents -->
  <rect x="28" y="28" width="28" height="4" fill="#c9a84c" opacity="0.9"/>
  <rect x="28" y="28" width="4" height="28" fill="#c9a84c" opacity="0.9"/>
  <rect x="1144" y="28" width="28" height="4" fill="#c9a84c" opacity="0.9"/>
  <rect x="1168" y="28" width="4" height="28" fill="#c9a84c" opacity="0.9"/>
  <rect x="28" y="598" width="28" height="4" fill="#c9a84c" opacity="0.9"/>
  <rect x="28" y="570" width="4" height="28" fill="#c9a84c" opacity="0.9"/>
  <rect x="1144" y="598" width="28" height="4" fill="#c9a84c" opacity="0.9"/>
  <rect x="1168" y="570" width="4" height="28" fill="#c9a84c" opacity="0.9"/>

  <!-- Badge -->
  <rect x="470" y="58" width="260" height="36" rx="18" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="82" text-anchor="middle"
    font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="15" font-weight="700" fill="#c9a84c" letter-spacing="2">소소킹 토론배틀</text>

  <!-- Main title -->
  <text x="600" y="210" text-anchor="middle"
    font-family="'Noto Serif KR','Apple SD Gothic Neo','Malgun Gothic',serif"
    font-size="96" font-weight="700" fill="url(#goldGrad)" letter-spacing="2">진지하면 진다</text>

  <!-- Emoji -->
  <text x="600" y="272" text-anchor="middle" font-size="36" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">😄</text>

  <!-- Divider -->
  <line x1="160" y1="305" x2="500" y2="305" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="305" r="3" fill="#c9a84c" opacity="0.5"/>
  <line x1="700" y1="305" x2="1040" y2="305" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="356" text-anchor="middle"
    font-family="'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif"
    font-size="26" fill="#f5f0e8" opacity="0.75" letter-spacing="1">재치·공감·유머가 논리보다 유리한 AI 토론배틀</text>

  <!-- Tags -->
  <g transform="translate(600, 420)">
    <rect x="-330" y="-18" width="136" height="36" rx="18" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-262" y="7" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#c9a84c" font-weight="700">👫 친구 초대</text>

    <rect x="-176" y="-18" width="136" height="36" rx="18" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="-108" y="7" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#c9a84c" font-weight="700">🎲 랜덤 매칭</text>

    <rect x="-22" y="-18" width="136" height="36" rx="18" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="46" y="7" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#c9a84c" font-weight="700">🤖 AI 대결</text>

    <rect x="132" y="-18" width="136" height="36" rx="18" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="200" y="7" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#c9a84c" font-weight="700">👨‍⚖️ 7인 심판</text>
  </g>

  <!-- VS battle bubbles -->
  <rect x="130" y="460" width="380" height="72" rx="12" fill="#e74c3c" fill-opacity="0.10" stroke="#e74c3c" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="320" y="491" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" fill="#e74c3c" font-weight="700">🔴 A팀</text>
  <text x="320" y="514" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#f5f0e8" opacity="0.8">"읽었으면 답장이 기본 예의"</text>

  <text x="600" y="502" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="22" font-weight="900" fill="#c9a84c">VS</text>

  <rect x="690" y="460" width="380" height="72" rx="12" fill="#3498db" fill-opacity="0.10" stroke="#3498db" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="880" y="491" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="13" fill="#3498db" font-weight="700">🔵 B팀</text>
  <text x="880" y="514" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="15" fill="#f5f0e8" opacity="0.8">"내 자유다, 카톡이 법은 아냐"</text>

  <!-- Bottom divider -->
  <line x1="80" y1="553" x2="1120" y2="553" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <polygon points="600,547 606,553 600,559 594,553" fill="#c9a84c" opacity="0.4"/>

  <!-- URL -->
  <text x="600" y="590" text-anchor="middle"
    font-family="monospace,sans-serif"
    font-size="18" fill="#c9a84c" opacity="0.5" letter-spacing="2">sosoking.co.kr</text>
</svg>
