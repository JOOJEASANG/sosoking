<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background for maskable (no transparent corners) -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ff7a4a"/>
      <stop offset="100%" stop-color="#c94010"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#E8602C"/>
  <rect width="512" height="512" fill="url(#bg)" opacity="0.55"/>

  <!-- Safe zone: 52px inset on each side (80% of 512) -->

  <!-- Left speech bubble -->
  <rect x="58" y="148" width="162" height="108" rx="26" fill="#fff" opacity="0.95"/>
  <polygon points="98,256 82,292 126,256" fill="#fff" opacity="0.95"/>
  <text x="139" y="210" text-anchor="middle" dominant-baseline="middle"
        font-size="64" fill="#E8602C"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">A</text>

  <!-- Right speech bubble -->
  <rect x="292" y="148" width="162" height="108" rx="26" fill="#fff" opacity="0.95"/>
  <polygon points="414,256 430,292 386,256" fill="#fff" opacity="0.95"/>
  <text x="373" y="210" text-anchor="middle" dominant-baseline="middle"
        font-size="64" fill="#3498db"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">B</text>

  <!-- VS badge -->
  <circle cx="256" cy="210" r="40" fill="rgba(0,0,0,0.28)"/>
  <circle cx="256" cy="210" r="40" fill="none" stroke="#fff" stroke-width="3" opacity="0.4"/>
  <text x="256" y="216" text-anchor="middle" dominant-baseline="middle"
        font-size="32" fill="#fff"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">VS</text>

  <!-- 소소킹 label -->
  <rect x="96" y="332" width="320" height="80" rx="22" fill="rgba(0,0,0,0.25)"/>
  <text x="256" y="373" text-anchor="middle" dominant-baseline="middle"
        font-size="40" fill="#fff"
        font-family="'Noto Sans KR',Arial,sans-serif" font-weight="900"
        letter-spacing="2">소소킹</text>
</svg>
