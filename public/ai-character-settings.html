<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 캐릭터 설정 · 소소킹</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f8fafc;color:#111827}
    main{max-width:680px;margin:0 auto;padding:24px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:18px;margin-bottom:14px}
    h1{font-size:24px;margin:0 0 8px}.muted{color:#6b7280;font-size:13px;line-height:1.6}label{display:block;font-size:13px;font-weight:900;margin:14px 0 6px}
    select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:12px;padding:11px 12px;font-size:14px;background:#fff}
    .switch{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px;margin-top:12px}.switch b{font-size:14px}.switch span{font-size:12px;color:#6b7280}.switch input{width:22px;height:22px}
    button{border:0;border-radius:12px;padding:11px 15px;font-weight:850;cursor:pointer}.primary{background:#6366f1;color:#fff}.ghost{background:#eef2ff;color:#3730a3}button:disabled{opacity:.55;cursor:not-allowed}
    .status{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:14px;padding:14px;font-size:12px;line-height:1.55;overflow:auto;max-height:260px}
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>🤖 AI 캐릭터 자동 댓글 설정</h1>
      <div class="muted">관리자 전용입니다. 비용과 악용 방지를 위해 자동 댓글은 명시적으로 켠 경우에만 실행됩니다.</div>
    </div>
    <div class="card">
      <div class="switch">
        <div><b>자동 댓글 사용</b><br><span>켜면 신규 커뮤니티 글에 AI 캐릭터 댓글이 등록됩니다.</span></div>
        <input type="checkbox" id="enabled">
      </div>
      <label for="count">게시글당 자동 댓글 수</label>
      <select id="count"><option value="1">1개</option><option value="2">2개</option><option value="3">3개</option></select>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px"><button class="primary" id="btn-save">설정 저장</button><button class="ghost" id="btn-refresh">다시 불러오기</button></div>
    </div>
    <div class="card"><div style="font-size:14px;font-weight:900;margin-bottom:8px">상태</div><pre class="status" id="status">불러오는 중...</pre></div>
  </main>
  <script type="module">
    import { auth, functions, onAuthStateChanged } from './js/firebase.js';
    import { httpsCallable } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js';
    const $ = id => document.getElementById(id);
    const getSettings = httpsCallable(functions, 'getAiCharacterSettings');
    const saveSettings = httpsCallable(functions, 'saveAiCharacterSettings');
    const show = value => { $('status').textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2); };
    const busy = value => { $('btn-save').disabled = value; $('btn-refresh').disabled = value; };
    async function load(){
      busy(true); show('설정을 불러오는 중...');
      try { const result=await getSettings({}); const settings=result.data?.settings||{}; $('enabled').checked=settings.enabled===true; $('count').value=String(Math.max(1,Math.min(Number(settings.count||2),3))); show({ok:true,settings}); }
      catch(error){ show(error.message||String(error)); }
      finally{ busy(false); }
    }
    async function save(){
      busy(true); show('저장 중...');
      try { const result=await saveSettings({autoCommentsEnabled:$('enabled').checked,autoCommentCount:Number($('count').value||2)}); show({ok:true,settings:result.data?.settings}); }
      catch(error){ show(error.message||String(error)); }
      finally{ busy(false); }
    }
    onAuthStateChanged(auth,user=>user?load():show('관리자 로그인이 필요합니다.'));
    $('btn-refresh').addEventListener('click',load);
    $('btn-save').addEventListener('click',save);
  </script>
</body>
</html>
