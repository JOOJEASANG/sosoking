    <text x="-22" y="9" text-anchor="middle" font-size="29" font-family="Noto Serif KR, Apple SD Gothic Neo, Malgun Gothic, serif" font-weight="900" fill="#f6e4a3">소소</text>
    <text x="47" y="9" text-anchor="middle" font-size="29" font-family="Noto Serif KR, Apple SD Gothic Neo, Malgun Gothic, serif" font-weight="900" fill="#c9a84c">킹</text>
  </g>

  <g transform="translate(189 62)">
    <circle cx="0" cy="0" r="24" fill="#101522" stroke="#c9a84c" stroke-width="2.5"/>
    <text x="0" y="10" text-anchor="middle" font-size="32" font-family="Noto Sans KR, Apple SD Gothic Neo, sans-serif" font-weight="900" fill="#c9a84c">?</text>
  </g>

  <path d="M53 61 C64 49 77 44 91 44" fill="none" stroke="#c9a84c" stroke-width="4" stroke-linecap="round" opacity="0.32"/>
  <path d="M44 83 C58 73 72 69 84 71" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
