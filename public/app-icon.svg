<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="소소킹 황당재판소 앱 아이콘">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26314f"/>
      <stop offset="0.55" stop-color="#151b2d"/>
      <stop offset="1" stop-color="#080b12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe8a8"/>
      <stop offset="0.52" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#8d641e"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="56%">
      <stop offset="0" stop-color="#c9a84c" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <rect width="256" height="256" rx="58" fill="url(#halo)"/>
  <rect x="14" y="14" width="228" height="228" rx="48" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.72"/>
  <rect x="25" y="25" width="206" height="206" rx="39" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <g filter="url(#softShadow)">
    <circle cx="128" cy="106" r="58" fill="rgba(255,255,255,0.04)" stroke="#c9a84c" stroke-width="2" opacity="0.7"/>
    <g transform="translate(128 104) rotate(-13)">
      <rect x="-9" y="-43" width="18" height="92" rx="9" fill="url(#gold)"/>
      <rect x="-48" y="39" width="96" height="18" rx="9" fill="url(#gold)"/>
      <rect x="-61" y="-62" width="122" height="24" rx="12" fill="url(#gold)"/>
      <circle cx="0" cy="-50" r="14" fill="#f7e4a3" stroke="#151b2d" stroke-width="4"/>
    </g>
  </g>

  <g transform="translate(128 185)">
