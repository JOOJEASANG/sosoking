<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소킹 운영 점검</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f7f8fb;color:#151821}.wrap{max-width:820px;margin:0 auto;padding:28px 16px 80px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}h1{margin:0;font-size:26px;letter-spacing:-.04em}a{color:#4f7cff;font-weight:800;text-decoration:none}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.card{background:#fff;border:1px solid #e7eaf0;border-radius:22px;padding:18px}.card b{display:block;font-size:17px}.card span{display:block;color:#6f7787;font-size:13px;line-height:1.6;margin-top:8px}.links,.actions{display:grid;gap:10px;margin-top:16px}.link,.btn{background:#fff;border:1px solid #e7eaf0;border-radius:16px;padding:14px;text-align:left;font-size:14px}.btn{cursor:pointer;color:#151821;font-weight:800}.btn.primary{background:#4f7cff;color:#fff;border-color:#4f7cff}.log{margin-top:16px;background:#101722;color:#dce8ff;border-radius:18px;padding:14px;min-height:90px;white-space:pre-wrap;font-size:12px;line-height:1.6}.note{margin-top:18px;color:#6f7787;font-size:12px;line-height:1.7}@media(max-width:680px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top"><h1>소소킹 운영 점검</h1><a href="/">사이트로 이동</a></div>
    <section class="grid">
      <div class="card"><b>예측판</b><span>오늘 열린 예측판은 메인 화면과 예측판 메뉴에서 확인합니다.</span></div>
      <div class="card"><b>랭킹</b><span>랭킹은 user_wallets의 소소머니 기준으로 표시됩니다.</span></div>
      <div class="card"><b>댓글</b><span>예측 상세 화면에서 댓글 저장과 표시를 확인합니다.</span></div>
      <div class="card"><b>자동 수집</b><span>RSS 기반 핫이슈 수집 함수가 매일 예측판을 생성합니다.</span></div>
    </section>
    <section class="actions">
      <button class="btn primary" id="collect-btn">오늘 핫이슈 수집 실행</button>
      <button class="btn" id="settle-btn">정산 실행</button>
    </section>
    <div class="log" id="admin-log">대기 중...</div>
    <section class="links">
      <a class="link" href="/#/predict">오늘의 예측판 보기</a>
      <a class="link" href="/#/ranking">랭킹 보기</a>
      <a class="link" href="/#/history">내 예측 기록 보기</a>
      <a class="link" href="/#/guide">이용안내 보기</a>
    </section>
    <p class="note">소소머니는 게임 전용 포인트이며 현금 가치가 없습니다.</p>
  </main>
  <script type="module" src="/admin/prediction-admin.js"></script>
</body>
</html>
