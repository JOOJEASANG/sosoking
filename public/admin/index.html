<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 소소킹 판결소</title>
  <link rel="icon" href="/app-icon.svg?v=20260630-3" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=20260630-3">
  <style>
    .admin-header{background:var(--navy-light);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .admin-header .logo{font-size:15px;color:var(--gold);font-weight:800;}
    .admin-shell{max-width:1120px;margin:0 auto;padding:20px 16px 80px;}
    .admin-nav{display:flex;gap:8px;overflow-x:auto;margin:14px 0 18px;padding-bottom:6px;}
    .admin-tab{white-space:nowrap;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--cream-dim);border-radius:999px;padding:8px 13px;font-size:12px;cursor:pointer;}
    .admin-tab.active{border-color:rgba(201,168,76,.7);background:rgba(201,168,76,.14);color:var(--gold);font-weight:800;}
    .admin-table{width:100%;border-collapse:collapse;font-size:12px;}
    .admin-table th,.admin-table td{border-bottom:1px solid var(--border);padding:9px 7px;text-align:left;vertical-align:top;}
    .admin-table th{color:var(--gold);font-size:11px;white-space:nowrap;}
    .admin-actions{display:flex;gap:5px;flex-wrap:wrap;}
    .admin-btn{border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--cream-dim);border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer;}
    .admin-btn.gold{border-color:rgba(201,168,76,.65);color:var(--gold);}
    .admin-btn.red{border-color:rgba(231,76,60,.65);color:var(--red);}
    .admin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
    @media(max-width:760px){.admin-grid{grid-template-columns:repeat(2,1fr);} .admin-shell{padding-left:12px;padding-right:12px;}}
  </style>
</head>
<body>
  <div id="admin-app"><div id="admin-content"></div></div>
  <div id="toast-container"></div>
  <script type="module" src="/admin/admin.js?v=20260630-3"></script>
  <script type="module" src="/admin/admin-delete.js?v=20260630-16"></script>
</body>
</html>
