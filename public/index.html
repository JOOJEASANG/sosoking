<body>
  <div id="app">
    <div id="page-content"></div>
    <footer id="site-footer"></footer>
  </div>
  <div id="toast-container"></div>
  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // ── PWA 설치 공통 로직 ──────────────────────────────────────────
    window._pwaPrompt = null;
    window._isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    window._isStandalone = () =>
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    // 통합 설치 안내 모달 (iOS / Android 분기)
    window._showInstallGuide = (type) => {
      document.getElementById('pwa-guide-modal')?.remove();
      const steps = type === 'ios'
        ? [['공유(↑)', '사파리 하단 <b style="color:#c9a84c;">공유 버튼 (↑)</b> 탭'],
           ['메뉴', '<b style="color:#c9a84c;">"홈 화면에 추가"</b> 선택'],
           ['완료', '<b style="color:#c9a84c;">"추가"</b> 탭 → 홈 화면에 아이콘 생성!']]
        : [['메뉴(⋮)', '주소창 오른쪽 <b style="color:#c9a84c;">점 세 개(⋮)</b> 탭'],
           ['선택', '<b style="color:#c9a84c;">"앱 설치"</b> 또는 <b style="color:#c9a84c;">"홈 화면에 추가"</b> 선택'],
           ['완료', '<b style="color:#c9a84c;">"설치"</b> 탭 → 홈 화면에 아이콘 생성!']];
      const note = type === 'ios'
        ? '💡 크롬·다른 브라우저에서는 설치 안 됩니다. 반드시 사파리로 접속하세요.'
        : '💡 삼성 인터넷: 메뉴 → "홈 화면에 추가" / 크롬 설치 안내가 나오면 "설치" 탭';
      const m = document.createElement('div');
      m.id = 'pwa-guide-modal';
      m.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;background:rgba(0,0,0,0.6);';
      m.innerHTML = `
        <div style="width:100%;background:#1a1730;border-radius:24px 24px 0 0;padding:28px 24px 48px;border-top:1.5px solid rgba(201,168,76,0.45);">
          <div style="width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 22px;"></div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
            <img src="/icon-192.png" style="width:48px;height:48px;border-radius:12px;flex-shrink:0;" alt="">
            <div>
              <div style="font-size:17px;font-weight:900;color:#fff;">${type === 'ios' ? '홈 화면에 추가하기' : '앱으로 설치하기'}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:3px;">${type === 'ios' ? 'iPhone · iPad · Safari 전용' : 'Android Chrome · 삼성 인터넷'}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:18px;">
            ${steps.map(([label, desc], i) => `
              <div style="display:flex;align-items:center;gap:14px;">
                <div style="min-width:36px;height:36px;border-radius:10px;background:rgba(201,168,76,0.13);border:1.5px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#c9a84c;">${i + 1}</div>
                <div style="font-size:14px;color:#f0e6c8;line-height:1.5;">${desc}</div>
              </div>`).join('')}
          </div>
          <div style="font-size:12px;color:rgba(255,255,255,0.38);padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.04);margin-bottom:20px;">${note}</div>
          <button onclick="document.getElementById('pwa-guide-modal').remove()"
            style="width:100%;padding:16px;border-radius:14px;border:none;background:rgba(255,255,255,0.07);color:#f0e6c8;font-size:15px;font-weight:700;cursor:pointer;">닫기</button>
        </div>`;
      m.addEventListener('click', e => { if (e.target === m) m.remove(); });
      document.body.appendChild(m);
    };

    // 설치 실행 함수 (footer 버튼 등에서 호출)
    window._pwaInstall = async () => {
      if (window._isStandalone()) {
        window._showInstallGuide('already');
        return;
      }
      if (window._pwaPrompt) {
        try {
          await window._pwaPrompt.prompt();
          const { outcome } = await window._pwaPrompt.userChoice;
          if (outcome === 'accepted') window._pwaPrompt = null;
        } catch { window._showInstallGuide('android'); }
        return;
      }
      window._showInstallGuide(window._isIOS ? 'ios' : 'android');
    };

    // Android: beforeinstallprompt 자동 배너
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window._pwaPrompt = e;
      if (window._isStandalone()) return;
      // 최근 3일 이내 배너 본 경우 스킵
      try {
        const last = localStorage.getItem('pwa_banner_ts');
        if (last && Date.now() - parseInt(last) < 3 * 86400000) return;
        localStorage.setItem('pwa_banner_ts', Date.now());
      } catch {}
      setTimeout(() => {
        if (document.getElementById('pwa-banner')) return;
        const banner = document.createElement('div');
        banner.id = 'pwa-banner';
        banner.innerHTML = `
          <img src="/icon-192.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;" alt="소소킹">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:#fff;">소소킹 앱 설치</div>
            <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px;">홈 화면에 추가해 빠르게 실행</div>
          </div>
          <button id="pwa-install-btn" style="padding:8px 16px;border-radius:20px;border:none;background:#c9a84c;color:#0d1117;font-size:12px;font-weight:900;cursor:pointer;flex-shrink:0;">설치</button>
          <button id="pwa-close-btn" style="width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
        `;
        banner.style.cssText = 'position:fixed;bottom:76px;left:12px;right:12px;z-index:8888;display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;background:linear-gradient(135deg,#1a1730,#0d1117);border:1.5px solid rgba(201,168,76,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:slideUp 0.3s ease;';
        document.body.appendChild(banner);
        document.getElementById('pwa-install-btn').addEventListener('click', () => {
          banner.remove();
          window._pwaInstall();
        });
        document.getElementById('pwa-close-btn').addEventListener('click', () => banner.remove());
      }, 2000);
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('pwa-banner')?.remove();
      window._pwaPrompt = null;
    });
  </script>
  <script nomodule>
    document.getElementById('page-content').innerHTML =
      '<div style="text-align:center;padding:80px 24px;font-family:sans-serif;">' +
      '<div style="font-size:48px;margin-bottom:16px;">🔥</div>' +
      '<p style="font-size:18px;font-weight:700;margin-bottom:8px;">브라우저 업데이트가 필요합니다</p>' +
      '<p style="font-size:14px;color:#888;">소소킹은 최신 브라우저에서 이용 가능합니다.<br>Chrome, Safari, Edge 최신 버전을 사용해주세요.</p>' +
      '</div>';
  </script>
