  <div id="app"><div id="page-content"></div><footer id="site-footer"></footer></div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}); }); }
    window._pwaPrompt = null;
    window._isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    window._isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    window._showInstallGuide = (type) => {
      document.getElementById('pwa-guide-modal')?.remove();
      const steps = type === 'ios'
        ? [['공유(↑)', '사파리 하단 공유 버튼 (↑) 탭'], ['메뉴', '홈 화면에 추가 선택'], ['완료', '추가 탭 → 홈 화면에 아이콘 생성']]
        : [['메뉴(⋮)', '주소창 오른쪽 점 세 개(⋮) 탭'], ['선택', '앱 설치 또는 홈 화면에 추가 선택'], ['완료', '설치 탭 → 홈 화면에 아이콘 생성']];
      const m = document.createElement('div');
      m.id = 'pwa-guide-modal';
      m.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;background:rgba(0,0,0,0.6);';
      m.innerHTML = `<div style="width:100%;background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 48px;border-top:1.5px solid rgba(79,124,255,0.25);"><div style="width:40px;height:4px;border-radius:2px;background:rgba(0,0,0,0.12);margin:0 auto 22px;"></div><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;"><img src="/icon-192.png" style="width:48px;height:48px;border-radius:12px;flex-shrink:0;" alt=""><div><div style="font-size:17px;font-weight:900;color:#151821;">${type === 'ios' ? '홈 화면에 추가하기' : '앱으로 설치하기'}</div><div style="font-size:12px;color:#6f7787;margin-top:3px;">소소킹</div></div></div><div style="display:flex;flex-direction:column;gap:14px;margin-bottom:18px;">${steps.map(([label, desc], i) => `<div style="display:flex;align-items:center;gap:14px;"><div style="min-width:36px;height:36px;border-radius:10px;background:rgba(79,124,255,0.1);border:1.5px solid rgba(79,124,255,0.18);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#4f7cff;">${i + 1}</div><div style="font-size:14px;color:#151821;line-height:1.5;">${desc}</div></div>`).join('')}</div><button onclick="document.getElementById('pwa-guide-modal').remove()" style="width:100%;padding:16px;border-radius:14px;border:none;background:#f0f3f8;color:#151821;font-size:15px;font-weight:700;cursor:pointer;">닫기</button></div>`;
      m.addEventListener('click', e => { if (e.target === m) m.remove(); });
      document.body.appendChild(m);
    };
    window._pwaInstall = async () => {
      if (window._isStandalone()) { window._showInstallGuide('already'); return; }
      if (window._pwaPrompt) { const p = window._pwaPrompt; window._pwaPrompt = null; try { await p.prompt(); await p.userChoice; } catch { window._showInstallGuide('android'); } return; }
      window._showInstallGuide(window._isIOS ? 'ios' : 'android');
    };
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); window._pwaPrompt = e; });
    window.addEventListener('appinstalled', () => { document.getElementById('pwa-banner')?.remove(); window._pwaPrompt = null; });
  </script>
