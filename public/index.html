<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소소킹 개편 중</title>
  <meta name="description" content="소소킹은 현재 새 서비스로 개편 중입니다.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="소소킹 개편 중">
  <meta property="og:description" content="더 안정적인 새 서비스로 다시 준비하겠습니다.">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #f4f7fb 0%, #eef7f4 100%);
      color: #111827;
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    section {
      width: min(520px, 100%);
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(148,163,184,.24);
      border-radius: 30px;
      padding: 38px 28px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(15,23,42,.12);
    }
    .mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: #2f7d6e;
      color: #fff;
      font-weight: 900;
      font-size: 24px;
    }
    h1 { margin: 0 0 12px; font-size: clamp(28px, 6vw, 38px); letter-spacing: -0.04em; }
    p { margin: 0; color: #64748b; line-height: 1.75; font-size: 16px; }
    .sub { margin-top: 18px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <main>
    <section>
      <div class="mark">소</div>
      <h1>소소킹 개편 중입니다</h1>
      <p>기존 사이트를 정리하고<br>새로운 서비스로 다시 준비하겠습니다.</p>
      <p class="sub">sosoking.co.kr</p>
    </section>
  </main>
</body>
</html>
