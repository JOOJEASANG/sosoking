<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>소소킹 재구축 중</title>
  <style>
    :root{color-scheme:dark light;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#111522;color:#f6f0e6;padding:24px}
    main{width:min(620px,100%);border:1px solid #555b70;border-radius:24px;padding:40px 28px;background:#1b2030;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.25)}
    h1{margin:0 0 14px;font-size:clamp(28px,7vw,44px)}
    p{margin:0;color:#c9cddd;line-height:1.8}
    small{display:block;margin-top:22px;color:#9299ae}
    @media(prefers-color-scheme:light){body{background:#f4efe6;color:#2d271f}main{background:#fffaf1;border-color:#d7cdbb;box-shadow:0 16px 38px rgba(85,66,35,.1)}p{color:#655e54}small{color:#8a8174}}
  </style>
</head>
<body>
  <main>
    <h1>소소킹을 다시 만들고 있습니다</h1>
    <p>기존 구조를 정리하고 핵심 재미에 집중한 새로운 황당재판소로 재구축 중입니다.</p>
    <small>Firebase 배포 기반과 Gemini 연결은 안전하게 유지됩니다.</small>
  </main>
</body>
</html>
