<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>판정 카드 프리뷰 v2</title>
<style>
  body { background:#0a0a12; display:flex; flex-direction:column; align-items:center; padding:40px 20px; font-family:sans-serif; gap:20px; }
  canvas { max-width:min(540px, 100%); border-radius:16px; box-shadow:0 12px 60px rgba(0,0,0,0.8); }
  .controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button { padding:10px 20px; border-radius:8px; border:none; background:#c9a84c; color:#000; font-weight:700; cursor:pointer; font-size:14px; }
  button:hover { background:#e0bc5e; }
  select { padding:10px; border-radius:8px; border:1px solid #333; background:#1a1a2e; color:#eee; font-size:14px; }
  label { color:#888; font-size:13px; display:flex; align-items:center; gap:6px; }
  .hint { color:#555; font-size:12px; text-align:center; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="controls">
  <label>승자:
    <select id="winner">
      <option value="plaintiff">🔴 A팀 승리</option>
      <option value="defendant">🔵 B팀 승리</option>
      <option value="draw">🤝 무승부</option>
    </select>
  </label>
  <label>심판:
    <select id="judge">
      <option value="감성형">🥹 감성형</option>
      <option value="엄벌주의형">👨‍⚖️ 엄벌주의형</option>
      <option value="현실주의형">🤦 현실주의형</option>
      <option value="과몰입형">🔥 과몰입형</option>
      <option value="피곤형">😴 피곤형</option>
      <option value="논리집착형">🧮 논리집착형</option>
      <option value="드립형">🎭 드립형</option>
    </select>
  </label>
  <button onclick="render()">🔄 새로고침</button>
  <button onclick="download()">💾 저장</button>
</div>
<canvas id="c"></canvas>
<p class="hint">실제 카드 비율 1080×1440 · 여기선 절반 크기로 표시</p>

<script>
const JUDGE_DEFS = {
  '엄벌주의형': { icon:'👨‍⚖️', color:'#c0392b' },
  '감성형':     { icon:'🥹',   color:'#8e44ad' },
  '현실주의형': { icon:'🤦',   color:'#7f8c8d' },
  '과몰입형':   { icon:'🔥',   color:'#e67e22' },
  '피곤형':     { icon:'😴',   color:'#95a5a6' },
  '논리집착형': { icon:'🧮',   color:'#2980b9' },
  '드립형':     { icon:'🎭',   color:'#27ae60' },
};

const SAMPLES = {
  plaintiff: {
    topicTitle: '카톡 읽씹 3시간 후 전화 실례인가 배틀',
    plaintiff:  { nickname: '읽씹은_범죄다' },
    defendant:  { nickname: '내_자유야' },
    verdict: {
      winner: 'plaintiff', scores: { plaintiff: 67, defendant: 33 },
      caseNumber: '소소킹-2025-0042',
      text: `판정이유: 감성형 심판의 눈시울이 붉어졌습니다. A팀의 "읽었으면 답장이 예의"라는 호소는 현대인의 소통 불안을 정확히 짚어냈어요. 읽씹 당한 이의 서운함이 이 배틀을 통해 온 우주에 전해지길 바랍니다 (흑흑).\n\nB팀의 "답장은 내 자유" 주장도 일리는 있으나, 3시간은 좀 너무하지 않나요? 읽은 건 알면서...
미션: B팀은 오늘 자정 전에 읽씹했던 모든 카톡에 이모티콘 하나씩 답장하고 스크린샷을 상대에게 보낼 것을 명한다`,
    },
  },
  defendant: {
    topicTitle: '치킨 마지막 조각 독식 배틀',
    plaintiff:  { nickname: '눈치가_예의다' },
    defendant:  { nickname: '먼저집으면_임자' },
    verdict: {
      winner: 'defendant', scores: { plaintiff: 35, defendant: 65 },
      caseNumber: '소소킹-2025-0077',
      text: `판정이유: 🤦 현실주의 심판 말합니다. 테이블 위에 올라온 음식은 공유 자산입니다. 눈치 보다가 못 먹으면 그건 본인 손해예요. B팀의 논리가 훨씬 현실적이고 명확합니다.\n\nA팀, 억울하면 다음에 더 빨리 집으세요. 이상.
미션: A팀은 다음 치킨 모임에서 마지막 조각을 솔선수범 먹겠다고 선언하고 인증샷을 보낼 것을 명한다`,
    },
  },
  draw: {
    topicTitle: '이불 독차지 무의식 무죄 배틀',
    plaintiff:  { nickname: '이불뺏긴자' },
    defendant:  { nickname: '무의식무죄' },
    verdict: {
      winner: 'draw', scores: { plaintiff: 50, defendant: 50 },
      caseNumber: '소소킹-2025-0099',
      text: `판정이유: 🔥 과몰입형 심판입니다. 이 사건은 인류의 수면권과 자유의지라는 철학적 충돌을 담고 있습니다! A팀의 수면 중 이불 침해 주장과 B팀의 무의식 행위 무죄 주장은 둘 다 인간 본질에 닿아있어 어느 한쪽의 손을 들어줄 수 없습니다!
미션: 두 팀 모두 각자 이불을 장만하고 이불 독립선언문을 작성해 서로에게 낭독할 것을 명한다`,
    },
  },
};

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arc(x+w-r,y+r,r,-Math.PI/2,0);
  ctx.lineTo(x+w,y+h-r); ctx.arc(x+w-r,y+h-r,r,0,Math.PI/2);
  ctx.lineTo(x+r,y+h); ctx.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
  ctx.lineTo(x,y+r); ctx.arc(x+r,y+r,r,Math.PI,-Math.PI/2);
  ctx.closePath();
}

function parseVerdict(text) {
  const lines = text.split('\n');
  const rLines = []; let sent = '', inR = false;
  for (const line of lines) {
    const t = line.trim();
    if (!t) { if(inR) rLines.push(''); continue; }
    if (/^판정이유/.test(t)) { inR=true; const c=t.replace(/^판정이유\s*[:\：]?\s*/,'').trim(); if(c) rLines.push(c); }
    else if (/^미션/.test(t)) { inR=false; sent=t.replace(/^미션\s*[:\：]?\s*/,'').trim(); }
    else if (/^(사건번호|판결|판정|A팀점수|B팀점수)\s*[:\：]/.test(t)) { inR=false; }
    else if (inR) rLines.push(t);
  }
  return { reason: rLines.join('\n').trim() || text.trim(), sentence: sent };
}

function wrap(ctx, text, maxW, font, maxLines=99) {
  ctx.font = font;
  if (ctx.measureText(text).width <= maxW) return [text];
  const lines=[]; let line='';
  for (const ch of [...text]) {
    const t=line+ch;
    if(ctx.measureText(t).width>maxW){ if(line) lines.push(line); line=ch; } else line=t;
  }
  if(line) lines.push(line);
  return lines.slice(0,maxLines);
}

async function render() {
  await document.fonts.ready;
  const winnerKey = document.getElementById('winner').value;
  const judgeKey  = document.getElementById('judge').value;
  const session   = { ...SAMPLES[winnerKey], judgeType: judgeKey };
  const verdict   = session.verdict;
  const isDraw    = verdict.winner === 'draw';
  const pWin      = verdict.winner === 'plaintiff';
  const pScore    = verdict.scores.plaintiff;
  const dScore    = verdict.scores.defendant;
  const parts     = parseVerdict(verdict.text || '');
  const judge     = JUDGE_DEFS[judgeKey];

  const W=1080, H=1440, PAD=68, INNER=W-PAD*2;
  const ACCENT  = isDraw?'#c9a84c': pWin?'#e74c3c':'#3498db';
  const ACCENT2 = isDraw?'#f0c060': pWin?'#ff7f7f':'#70c0f0';
  const GOLD='#c9a84c', GOLD_DIM='rgba(201,168,76,0.45)', CREAM='#f0e6c8', CREAM_DIM='rgba(240,230,200,0.65)';

  const canvas = document.getElementById('c');
  canvas.width=W; canvas.height=H;
  const ctx = canvas.getContext('2d');

  // 배경
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#13111e'); bg.addColorStop(0.6,'#0c0f1a'); bg.addColorStop(1,'#080b12');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const glow1=ctx.createRadialGradient(W/2,0,0,W/2,0,820);
  glow1.addColorStop(0, isDraw?'rgba(201,168,76,0.30)':pWin?'rgba(231,76,60,0.28)':'rgba(52,152,219,0.28)');
  glow1.addColorStop(0.6,'rgba(0,0,0,0.05)'); glow1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow1; ctx.fillRect(0,0,W,H);

  const glow2=ctx.createRadialGradient(W/2,H,0,W/2,H,500);
  glow2.addColorStop(0,'rgba(201,168,76,0.12)'); glow2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow2; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle=ACCENT; ctx.lineWidth=5;
  roundRect(ctx,16,16,W-32,H-32,28); ctx.stroke();
  ctx.strokeStyle=isDraw?GOLD_DIM:pWin?'rgba(231,76,60,0.3)':'rgba(52,152,219,0.3)'; ctx.lineWidth=1.5;
  roundRect(ctx,28,28,W-56,H-56,22); ctx.stroke();

  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  let y=72;

  // 헤더
  ctx.font='700 26px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(240,230,200,0.35)';
  ctx.fillText(verdict.caseNumber||'소소킹 토론배틀', W/2, y); y+=44;

  // 승자 히어로
  const winnerLabel = isDraw?'🤝 무승부': pWin?'🔴 A팀 승리':'🔵 B팀 승리';
  ctx.font='900 94px "Noto Serif KR",serif'; ctx.fillStyle=ACCENT2;
  ctx.shadowColor=ACCENT; ctx.shadowBlur=32;
  ctx.fillText(winnerLabel, W/2, y+86); y+=110; ctx.shadowBlur=0;

  // 닉네임
  const pNick=(session.plaintiff?.nickname||'A팀').slice(0,10);
  const dNick=(session.defendant?.nickname||'B팀').slice(0,10);
  ctx.font='400 28px "Noto Sans KR",sans-serif';
  ctx.fillStyle='rgba(231,76,60,0.85)'; ctx.textAlign='left'; ctx.fillText(`🔴 ${pNick}`,PAD,y);
  ctx.fillStyle='rgba(52,152,219,0.85)'; ctx.textAlign='right'; ctx.fillText(`${dNick} 🔵`,W-PAD,y);
  ctx.textAlign='center'; y+=44;

  // 점수 바
  const barH=18, barR=9;
  ctx.fillStyle='rgba(255,255,255,0.08)'; roundRect(ctx,PAD,y,INNER,barH,barR); ctx.fill();
  const pW=Math.round(INNER*pScore/100)-3, dW=INNER-pW-6;
  if(pW>0){ const pg=ctx.createLinearGradient(PAD,0,PAD+pW,0); pg.addColorStop(0,'#e74c3c'); pg.addColorStop(1,'#ff7f7f'); ctx.fillStyle=pg; roundRect(ctx,PAD,y,pW,barH,barR); ctx.fill(); }
  if(dW>0){ const dg=ctx.createLinearGradient(W-PAD-dW,0,W-PAD,0); dg.addColorStop(0,'#5dade2'); dg.addColorStop(1,'#3498db'); ctx.fillStyle=dg; roundRect(ctx,PAD+pW+6,y,dW,barH,barR); ctx.fill(); }
  y+=barH+16;
  ctx.font='700 28px "Noto Sans KR",sans-serif';
  ctx.fillStyle='rgba(231,76,60,0.9)'; ctx.textAlign='left'; ctx.fillText(`${pScore}점`,PAD,y);
  ctx.fillStyle='rgba(52,152,219,0.9)'; ctx.textAlign='right'; ctx.fillText(`${dScore}점`,W-PAD,y);
  ctx.textAlign='center'; y+=40;

  // 주제명
  const tLines=wrap(ctx,session.topicTitle||'배틀 주제',INNER,'700 38px "Noto Sans KR",sans-serif',2);
  ctx.font='700 38px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(240,230,200,0.75)';
  tLines.forEach(l=>{ctx.fillText(l,W/2,y);y+=52;}); y+=16;

  const sep=(yy,op=0.3)=>{ctx.strokeStyle=`rgba(201,168,76,${op})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD,yy);ctx.lineTo(W-PAD,yy);ctx.stroke();};
  sep(y); y+=40;

  // 심판
  if(judge){
    ctx.font='700 30px "Noto Sans KR",sans-serif'; ctx.fillStyle=judge.color||GOLD;
    ctx.fillText(`${judge.icon}  ${judgeKey} 심판의 판정`,W/2,y); y+=50;
  }

  // 어록 (첫 문장 인용)
  if(parts.reason){
    const flat=parts.reason.replace(/\n+/g,' ').trim();
    const dot=flat.search(/[.!?。]/);
    const quote=dot>0&&dot<120?flat.slice(0,dot+1):flat.slice(0,110)+(flat.length>110?'…':'');
    const qLines=wrap(ctx,`"${quote}"`,INNER-60,'400 34px "Noto Sans KR",sans-serif',4);
    const qBoxH=qLines.length*52+56;
    ctx.fillStyle='rgba(255,255,255,0.04)'; roundRect(ctx,PAD,y,INNER,qBoxH,18); ctx.fill();
    ctx.fillStyle=ACCENT; roundRect(ctx,PAD,y,5,qBoxH,3); ctx.fill();
    ctx.font='400 34px "Noto Sans KR",sans-serif'; ctx.fillStyle=CREAM_DIM;
    let qy=y+38; qLines.forEach(l=>{ctx.fillText(l,W/2,qy);qy+=52;}); y+=qBoxH+32;

    const rest=flat.slice(quote.replace(/^"|"$/g,'').length).trim();
    if(rest){ const rL=wrap(ctx,rest,INNER,'400 30px "Noto Sans KR",sans-serif',2); ctx.font='400 30px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(240,230,200,0.45)'; rL.forEach(l=>{ctx.fillText(l,W/2,y);y+=44;}); y+=8; }
  }

  // 미션
  if(parts.sentence){
    sep(y,0.4); y+=36;
    ctx.font='700 30px "Noto Sans KR",sans-serif'; ctx.fillStyle=GOLD;
    ctx.fillText('🎯 미션',W/2,y); y+=44;
    const mLines=wrap(ctx,parts.sentence,INNER-56,'700 36px "Noto Serif KR",serif',3);
    const mBoxH=mLines.length*54+48;
    ctx.fillStyle='rgba(201,168,76,0.08)'; roundRect(ctx,PAD,y,INNER,mBoxH,18); ctx.fill();
    ctx.strokeStyle='rgba(201,168,76,0.5)'; ctx.lineWidth=2; roundRect(ctx,PAD,y,INNER,mBoxH,18); ctx.stroke();
    ctx.font='700 36px "Noto Serif KR",serif'; ctx.fillStyle=CREAM;
    let my=y+38; mLines.forEach(l=>{ctx.fillText(l,W/2,my);my+=54;}); y+=mBoxH+32;
  }

  // 푸터
  sep(H-100,0.25);
  ctx.font='700 28px "Noto Sans KR",sans-serif'; ctx.fillStyle=GOLD;
  ctx.fillText('⚔️  sosoking.co.kr  — 나도 배틀하기', W/2, H-70);
}

function download(){
  const a=document.createElement('a');
  a.href=document.getElementById('c').toDataURL('image/png');
  a.download='sosoking-card-v2.png'; a.click();
}

render();
</script>
</body>
</html>
