<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background: navy rounded square -->
  <rect width="200" height="200" rx="38" fill="#161b2e"/>

  <!-- Pillar -->
  <rect x="94" y="88" width="12" height="74" rx="5" fill="#c9a84c"/>
  <!-- Base -->
  <rect x="70" y="154" width="60" height="12" rx="6" fill="#c9a84c"/>

  <!-- Beam: dramatically tilted ~22 degrees, left side DOWN -->
  <!-- Left end: ~(24, 113)  Right end: ~(176, 67) -->
  <line x1="24" y1="113" x2="176" y2="67" stroke="#c9a84c" stroke-width="7" stroke-linecap="round"/>

  <!-- Pivot cap (gold circle) -->
  <circle cx="100" cy="90" r="9" fill="#e8c97a" stroke="#161b2e" stroke-width="2.5"/>

  <!-- LEFT SIDE: heavy "억울!" pan -->
  <!-- Chains hanging down from left beam end -->
  <line x1="17" y1="114" x2="13" y2="133" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="31" y1="114" x2="35" y2="133" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Left pan (heavy, sitting almost on the base) -->
  <ellipse cx="24" cy="137" rx="24" ry="8" fill="#c9a84c"/>
  <ellipse cx="24" cy="135" rx="24" ry="8" fill="#e8c97a"/>
  <text x="24" y="138" text-anchor="middle" dominant-baseline="middle"
        font-size="11" fill="#161b2e" font-family="'Noto Sans KR',sans-serif" font-weight="900">억울!</text>

  <!-- RIGHT SIDE: empty, floating high -->
  <!-- Chains -->
  <line x1="169" y1="67" x2="163" y2="50" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="183" y1="67" x2="189" y2="50" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Right pan (light, almost empty) -->
  <ellipse cx="176" cy="46" rx="19" ry="6" fill="#c9a84c" opacity="0.35"/>
  <text x="176" y="47" text-anchor="middle" dominant-baseline="middle"
        font-size="13" fill="#c9a84c" opacity="0.55" font-family="sans-serif">…</text>

  <!-- SWEAT DROPS (stress near pivot) -->
  <!-- Drop 1 -->
  <path d="M116,79 C116,79 119,71 122,73.5 C124.5,76 121,82 116,79Z"
        fill="#4dabf7" opacity="0.9"/>
  <!-- Drop 2 smaller -->
  <path d="M123,68 C123,68 125,63 127,65 C128.5,67 126,70 123,68Z"
        fill="#4dabf7" opacity="0.7"/>

  <!-- Stress marks !! near beam center -->
  <text x="108" y="76" font-size="13" fill="#e74c3c" font-weight="900"
        font-family="sans-serif" opacity="0.85">!!</text>
</svg>
