<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background: warm coral rounded square -->
  <rect width="200" height="200" rx="38" fill="#E8602C"/>

  <!-- Left speech bubble (A팀) -->
  <rect x="14" y="52" width="74" height="52" rx="14" fill="#fff" opacity="0.95"/>
  <polygon points="36,104 28,120 52,104" fill="#fff" opacity="0.95"/>
  <text x="51" y="84" text-anchor="middle" dominant-baseline="middle"
        font-size="17" fill="#E8602C" font-family="'Noto Sans KR',sans-serif" font-weight="900">A팀</text>

  <!-- Right speech bubble (B팀) -->
  <rect x="112" y="52" width="74" height="52" rx="14" fill="#fff" opacity="0.95"/>
  <polygon points="164,104 172,120 148,104" fill="#fff" opacity="0.95"/>
  <text x="149" y="84" text-anchor="middle" dominant-baseline="middle"
        font-size="17" fill="#3498db" font-family="'Noto Sans KR',sans-serif" font-weight="900">B팀</text>

  <!-- VS fire in center -->
  <text x="100" y="90" text-anchor="middle" dominant-baseline="middle"
        font-size="22" font-family="sans-serif">🔥</text>

  <!-- 소소킹 label -->
  <rect x="30" y="138" width="140" height="34" rx="10" fill="rgba(0,0,0,0.18)"/>
  <text x="100" y="155" text-anchor="middle" dominant-baseline="middle"
        font-size="16" fill="#fff" font-family="'Noto Sans KR',sans-serif" font-weight="900"
        letter-spacing="1">소소킹</text>
</svg>
