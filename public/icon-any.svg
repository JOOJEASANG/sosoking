<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: coral rounded square -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ff7a4a"/>
      <stop offset="100%" stop-color="#c94010"/>
    </radialGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <rect width="512" height="512" rx="96" fill="#E8602C"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)" opacity="0.55"/>

  <!-- Left speech bubble (A) -->
  <rect x="34" y="138" width="184" height="118" rx="30" fill="#fff" opacity="0.95"/>
  <!-- Bubble tail -->
  <polygon points="80,256 62,296 116,256" fill="#fff" opacity="0.95"/>
  <!-- A text -->
  <text x="126" y="209" text-anchor="middle" dominant-baseline="middle"
        font-size="72" fill="#E8602C"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">A</text>

  <!-- Right speech bubble (B) -->
  <rect x="294" y="138" width="184" height="118" rx="30" fill="#fff" opacity="0.95"/>
  <!-- Bubble tail -->
  <polygon points="432,256 450,296 396,256" fill="#fff" opacity="0.95"/>
  <!-- B text -->
  <text x="386" y="209" text-anchor="middle" dominant-baseline="middle"
        font-size="72" fill="#3498db"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">B</text>

  <!-- VS badge in center -->
  <circle cx="256" cy="216" r="42" fill="rgba(0,0,0,0.28)"/>
  <circle cx="256" cy="216" r="42" fill="none" stroke="#fff" stroke-width="3" opacity="0.4"/>
  <text x="256" y="222" text-anchor="middle" dominant-baseline="middle"
        font-size="36" fill="#fff"
        font-family="'Arial Black',Arial,sans-serif" font-weight="900">VS</text>

  <!-- 소소킹 label -->
  <rect x="72" y="338" width="368" height="88" rx="24" fill="rgba(0,0,0,0.25)"/>
  <text x="256" y="383" text-anchor="middle" dominant-baseline="middle"
        font-size="44" fill="#fff"
        font-family="'Noto Sans KR',Arial,sans-serif" font-weight="900"
        letter-spacing="2">소소킹</text>
</svg>
