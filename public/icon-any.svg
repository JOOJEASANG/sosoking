<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent bg — rounded square for "any" purpose -->
  <rect width="512" height="512" rx="96" fill="#E8602C"/>

  <!-- Left speech bubble (A팀) -->
  <rect x="36" y="136" width="188" height="130" rx="34" fill="#fff" opacity="0.95"/>
  <polygon points="92,266 72,308 134,266" fill="#fff" opacity="0.95"/>
  <text x="130" y="212" text-anchor="middle" dominant-baseline="middle"
        font-size="52" fill="#E8602C" font-family="'Noto Sans KR',Arial,sans-serif" font-weight="900">A팀</text>

  <!-- Right speech bubble (B팀) -->
  <rect x="288" y="136" width="188" height="130" rx="34" fill="#fff" opacity="0.95"/>
  <polygon points="420,266 440,308 378,266" fill="#fff" opacity="0.95"/>
  <text x="382" y="212" text-anchor="middle" dominant-baseline="middle"
        font-size="52" fill="#3498db" font-family="'Noto Sans KR',Arial,sans-serif" font-weight="900">B팀</text>

  <!-- VS fire in center -->
  <text x="256" y="232" text-anchor="middle" dominant-baseline="middle"
        font-size="64" font-family="sans-serif">⚔️</text>

  <!-- 소소킹 label -->
  <rect x="76" y="340" width="360" height="86" rx="24" fill="rgba(0,0,0,0.22)"/>
  <text x="256" y="384" text-anchor="middle" dominant-baseline="middle"
        font-size="46" fill="#fff" font-family="'Noto Sans KR',Arial,sans-serif" font-weight="900"
        letter-spacing="3">소소킹</text>
</svg>
