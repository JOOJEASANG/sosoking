name: Validate and Deploy Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Functions dependencies
        run: npm install --prefix functions --no-audit --no-fund

      - name: Validate Functions syntax and deployment coverage
        run: npm run lint --prefix functions

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: firebase-deploy-main
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI and Functions dependencies
        run: |
          npm install -g firebase-tools
          npm install --prefix functions --no-audit --no-fund

      - name: Prepare service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      # Callable Functions must exist before rules disable direct client writes/deletes.
      - name: Deploy all exported Functions first
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FUNCTION_TARGETS: functions:submitCase,functions:suggestCaseTitle,functions:generateTrial,functions:syncJudgmentStructure,functions:backfillJudgmentStructures,functions:backfillJudgmentStructuresNow,functions:createDailyAiCase,functions:generateDailyAiNow,functions:checkNickname,functions:setNickname,functions:voteResult,functions:addCourtComment,functions:requestAppeal,functions:deleteMyCase,functions:deleteCourtPost,functions:deleteUserProfile,functions:recoverStaleTrials,functions:repairSocialCounters,functions:recoverStaleTrialsNow,functions:repairSocialCountersNow
        run: firebase deploy --only "$FUNCTION_TARGETS" --project sosoking-481e6 --non-interactive

      # Keep this legacy step name until the regression check is updated.
      - name: Deploy rules, indexes, storage and hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only firestore:rules,firestore:indexes,hosting --project sosoking-481e6 --non-interactive

      # Storage uses a separate Firebase Storage API permission. Do not block core deployment
      # while the GitHub Actions service account lacks firebasestorage.defaultBucket.get.
      - name: Deploy Storage Rules separately
        id: deploy_storage
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only storage --project sosoking-481e6 --non-interactive

      - name: Report missing Firebase Storage IAM permission
        if: steps.deploy_storage.outcome == 'failure'
        run: |
          echo "::warning title=Firebase Storage Rules not deployed::Grant firebasestorage.defaultBucket.get to the service account in FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6. roles/firebasestorage.viewer is the minimum lookup role; roles/firebasestorage.admin is broader. Functions, Firestore and Hosting were deployed successfully."
