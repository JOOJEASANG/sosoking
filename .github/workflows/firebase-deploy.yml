name: Deploy Firebase Backend

# 운영 백엔드는 main 브랜치에서 관련 파일이 변경될 때만 배포합니다.
# 화면(public)은 firebase-hosting.yml에서 별도로 검사 후 배포합니다.
# Storage rules는 현재 서비스 계정 권한 문제로 자동 배포 대상에서 제외합니다.
on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tools/**'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: firebase-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Check and deploy backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      FIREBASE_PROJECT_ID: sosoking-481e6
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Static check
        run: npm run check

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 secret이 설정되지 않았습니다."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Register GEMINI_API_KEY in Secret Manager
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret 없음 — 건너뜀"
            exit 0
          fi
          printf '%s' "$GEMINI_API_KEY" | \
            firebase functions:secrets:set GEMINI_API_KEY \
              --data-file=- --project "$FIREBASE_PROJECT_ID" || \
            echo "::warning::GEMINI_API_KEY Secret Manager 등록 실패 (권한 확인 필요)"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Register ANTHROPIC_API_KEY in Secret Manager
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret 없음 — 건너뜀"
            exit 0
          fi
          printf '%s' "$ANTHROPIC_API_KEY" | \
            firebase functions:secrets:set ANTHROPIC_API_KEY \
              --data-file=- --project "$FIREBASE_PROJECT_ID" || \
            echo "::warning::ANTHROPIC_API_KEY Secret Manager 등록 실패 (권한 확인 필요)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes

      - name: Deploy Functions
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions --force
