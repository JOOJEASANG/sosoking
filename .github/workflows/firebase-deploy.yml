name: Deploy Firebase Backend

# 운영 백엔드는 main 브랜치에서 관련 파일이 변경될 때만 배포합니다.
# AI 키 교체는 운영 배포와 분리하고 Firebase Secret Manager의 기존 값을 사용합니다.
on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tools/**'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: firebase-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    name: Check and deploy backend
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: sosoking-481e6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Static check
        id: static_check
        run: npm run check

      - name: Authenticate to Google Cloud
        id: firebase_auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}

      - name: Deploy Firestore rules and indexes
        id: deploy_firestore
        run: npx firebase-tools deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes --non-interactive

      - name: Deploy Storage rules
        id: deploy_storage
        run: npx firebase-tools deploy --project "$FIREBASE_PROJECT_ID" --only storage --non-interactive

      - name: Deploy Functions
        id: deploy_functions
        run: npx firebase-tools deploy --project "$FIREBASE_PROJECT_ID" --only functions --force --non-interactive

      - name: Report production Backend result
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
          STATIC_RESULT: ${{ steps.static_check.outcome }}
          AUTH_RESULT: ${{ steps.firebase_auth.outcome }}
          FIRESTORE_RESULT: ${{ steps.deploy_firestore.outcome }}
          STORAGE_RESULT: ${{ steps.deploy_storage.outcome }}
          FUNCTIONS_RESULT: ${{ steps.deploy_functions.outcome }}
        run: |
          body="운영 Backend 배포 결과: **${RESULT}** · 커밋 \`${GITHUB_SHA}\`

          - 정적검사: ${STATIC_RESULT}
          - Google Cloud 인증: ${AUTH_RESULT}
          - Firestore Rules·Indexes: ${FIRESTORE_RESULT}
          - Storage Rules: ${STORAGE_RESULT}
          - Functions: ${FUNCTIONS_RESULT}"
          if ! gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/182/comments" -f body="$body"; then
            echo "배포 결과 댓글을 기록하지 못했습니다. 실제 배포 단계 상태는 Actions 로그를 확인하세요."
          fi
