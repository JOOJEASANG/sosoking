name: Firebase 자동 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-hosting:
    name: Firebase Hosting 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Firebase Hosting 라이브 배포
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
          channelId: live
          projectId: sosoking-481e6

  deploy-firestore-rules:
    name: Firestore 규칙 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Firebase CLI 설치
        run: npm install --global firebase-tools

      - name: Firebase 서비스 계정 준비
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "GitHub Actions secret FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6가 필요합니다."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Firestore 규칙 배포
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project sosoking-481e6 --only firestore:rules --non-interactive
