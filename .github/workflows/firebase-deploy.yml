name: 소소킹 전체 소스 적용 및 Firebase 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sosoking-source-import
  cancel-in-progress: false

permissions:
  contents: write

env:
  FIREBASE_PROJECT_ID: sosoking-481e6
  SOURCE_SHA256: 9732402eecfd9e25ade54728da56008b156d7e8f8cb23d92dad19b74d343636e

jobs:
  import-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 업로드 압축 파일 복원
        run: |
          test -d .upload_parts
          cat .upload_parts/part_*.txt > "$RUNNER_TEMP/sosoking.b64"
          base64 --decode "$RUNNER_TEMP/sosoking.b64" > "$RUNNER_TEMP/sosoking.zip"
          echo "$SOURCE_SHA256  $RUNNER_TEMP/sosoking.zip" | sha256sum --check --strict

      - name: 압축 파일 안전 검사 및 해제
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          archive = Path("${{ runner.temp }}/sosoking.zip")
          target = Path("${{ runner.temp }}/sosoking-source")
          target.mkdir(parents=True, exist_ok=True)
          base = target.resolve()

          with ZipFile(archive) as zf:
              for item in zf.infolist():
                  resolved = (target / item.filename).resolve()
                  if resolved != base and base not in resolved.parents:
                      raise SystemExit(f"Unsafe archive path: {item.filename}")
              zf.extractall(target)
          PY

      - name: 저장소 소스를 압축본으로 교체
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "$RUNNER_TEMP/sosoking-source/." .
          mkdir -p .github/workflows
          printf '%s' '' | base64 --decode > .github/workflows/firebase-deploy.yml

      - name: 전체 소스 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "소소킹 전체 애플리케이션 업로드"
          git push origin HEAD:main

      - name: Cloud Functions 의존성 설치
        run: npm ci --prefix functions --no-audit --no-fund

      - name: JavaScript 구문 검사
        run: npm run check

      - name: Firebase CLI 설치
        run: npm install --global firebase-tools

      - name: Firebase 서비스 계정 준비
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Hosting·Rules·Indexes·Storage 배포
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,firestore:rules,firestore:indexes,storage --non-interactive

      - name: Cloud Functions 배포
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions --non-interactive
