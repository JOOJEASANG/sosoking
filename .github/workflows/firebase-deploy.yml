name: Deploy Firebase Backend

# 운영 백엔드는 main 브랜치에서 관련 파일이 변경될 때만 배포합니다.
# 화면(public)은 firebase-hosting.yml에서 별도로 검사 후 배포합니다.
on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tools/**'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: firebase-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    name: Check and deploy backend
    runs-on: ubuntu-latest

    env:
      FIREBASE_PROJECT_ID: sosoking-481e6
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Static check
        run: npm run check

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Firebase service account secret이 설정되지 않았습니다."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes --non-interactive

      - name: Deploy Storage rules
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only storage --non-interactive

      - name: Deploy Functions
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions --force --non-interactive

      - name: Report production Backend result
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        run: |
          body="운영 Backend 배포 결과: **${RESULT}** · 커밋 \`${GITHUB_SHA}\`"
          if ! gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/182/comments" -f body="$body"; then
            echo "배포 결과 댓글을 기록하지 못했습니다. 실제 배포 단계 상태는 Actions 로그를 확인하세요."
          fi
