name: Firebase 전체 배포

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  FIREBASE_PROJECT_ID: sosoking-481e6

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 22 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Cloud Functions 의존성 설치
        run: npm ci --prefix functions --no-audit --no-fund

      - name: JavaScript 구문 검사
        run: npm run check

      - name: Firebase CLI 설치
        run: npm install --global firebase-tools

      - name: Firebase 서비스 계정 준비
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: AI Secret 등록 확인
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            printf '%s' "$GEMINI_API_KEY" | firebase functions:secrets:set GEMINI_API_KEY --data-file=- --project "$FIREBASE_PROJECT_ID" || \
              echo "::warning::GEMINI_API_KEY 등록 실패: Secret Manager 권한을 확인하세요."
          else
            echo "::notice::GitHub GEMINI_API_KEY secret이 없어 기존 Firebase Secret을 사용합니다."
          fi

          if [ -n "$ANTHROPIC_API_KEY" ]; then
            printf '%s' "$ANTHROPIC_API_KEY" | firebase functions:secrets:set ANTHROPIC_API_KEY --data-file=- --project "$FIREBASE_PROJECT_ID" || \
              echo "::warning::ANTHROPIC_API_KEY 등록 실패: Secret Manager 권한을 확인하세요."
          else
            echo "::notice::GitHub ANTHROPIC_API_KEY secret이 없어 기존 Firebase Secret을 사용합니다."
          fi

      - name: Hosting·Firestore Rules·Indexes 배포
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,firestore:rules,firestore:indexes --non-interactive

      - name: Cloud Functions 배포
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions --force --non-interactive
