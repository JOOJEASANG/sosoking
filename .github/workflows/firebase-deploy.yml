name: Firebase 자동 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Hosting 및 Firestore 규칙 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Firebase CLI 설치
        run: npm install --global firebase-tools

      - name: Firebase 프로젝트 배포
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "GitHub Actions secret FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6가 필요합니다."
            exit 1
          fi
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          firebase deploy --project sosoking-481e6 --only hosting,firestore:rules --non-interactive
