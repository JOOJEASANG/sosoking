name: Validate and Deploy Firebase Core

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-core-${{ github.ref }}
  cancel-in-progress: false

env:
  FIREBASE_PROJECT_ID: sosoking-481e6

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Functions dependencies
        run: npm install --prefix functions --no-audit --no-fund

      - name: Check backend syntax
        run: npm run check:backend --prefix functions

      - name: Check frontend syntax
        run: npm run check:frontend --prefix functions

      - name: Verify judgment V2 schema
        run: node functions/verify-judgment-v2.js

      - name: Verify case-specific serious humor
        run: node functions/verify-judgment-story-v2.js

      - name: Verify judgment screen integration
        run: node functions/verify-judgment-v2-integration.js

      - name: Verify security contract
        run: npm run check:security --prefix functions

      - name: Verify deployment contract
        run: npm run check:deployment --prefix functions

  deploy-core:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/force-production-deploy'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI and Functions dependencies
        run: |
          npm install -g firebase-tools
          npm install --prefix functions --no-audit --no-fund

      - name: Prepare Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy Functions from current source
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only functions --force --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Deploy Firestore rules and indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Deploy Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
