name: Validate and Deploy Sosoking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-core-${{ github.ref }}
  cancel-in-progress: false

env:
  FIREBASE_PROJECT_ID: sosoking-481e6

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Functions dependencies
        run: npm install --prefix functions --no-audit --no-fund

      - name: Check backend syntax
        run: npm run check:backend --prefix functions

      - name: Check frontend syntax
        run: npm run check:frontend --prefix functions

      - name: Verify Stage 1
        run: npm run verify:stage1 --prefix functions

      - name: Verify Stage 2
        run: npm run verify:stage2 --prefix functions

      - name: Verify Stage 3
        run: npm run verify:stage3 --prefix functions

      - name: Verify Stage 4
        run: npm run verify:stage4 --prefix functions

      - name: Verify Stage 5
        run: npm run verify:stage5 --prefix functions

      - name: Verify Stage 6
        run: npm run verify:stage6 --prefix functions

      - name: Verify Stage 7
        run: npm run verify:stage7 --prefix functions

      - name: Verify Stage 8
        run: npm run verify:stage8 --prefix functions

      - name: Validate Firebase files
        run: |
          test -f firebase.json
          test -f .firebaserc
          test -f firestore.rules
          test -f firestore.indexes.json
          test -f storage.rules
          test -f public/index.html
          test -f public/health.json
          test -f functions/role-based-trial.js
          test -f functions/verify-deployment.js
          grep -q "GEMINI_API_KEY" functions/main.js
          grep -q "exports.generateJudgment" functions/main.js
          grep -q "FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6" .github/workflows/firebase-deploy.yml

  deploy-core:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI and Functions dependencies
        run: |
          npm install -g firebase-tools
          npm install --prefix functions --no-audit --no-fund

      - name: Prepare Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy Firebase application
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --only functions,firestore:rules,firestore:indexes,hosting --force --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Verify deployed role trial build
        env:
          VERIFY_ATTEMPTS: 18
          VERIFY_DELAY_MS: 10000
        run: |
          node functions/verify-deployment.js \
            "https://sosoking-481e6.web.app/health.json" \
            "https://sosoking.co.kr/health.json"

      - name: Publish Firebase deploy commit status
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'firebase/deploy',
              description: state === 'success'
                ? 'Role trial v10 deployed and verified'
                : 'Firebase deploy or live verification failed'
            });
