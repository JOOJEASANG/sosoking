name: Firebase 자동 배포

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  FIREBASE_PROJECT_ID: sosoking-481e6

jobs:
  deploy:
    name: Firebase Hosting 및 Firestore 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Firebase CLI 설치
        run: npm install --global firebase-tools

      - name: Firebase 서비스 계정 준비
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Firebase 설정 확인
        run: |
          test -f firebase.json
          test -f .firebaserc
          test -f index-v4.html
          test -f assets/sosoking-v4.css
          test -f assets/sosoking-v4.js
          test -f assets/sosoking-detail-data.js

      - name: Hosting 및 Firestore 규칙 배포
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,firestore:rules --non-interactive
