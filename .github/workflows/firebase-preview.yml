name: Preview UI Check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tools/**'
      - '.github/workflows/firebase-preview.yml'

permissions:
  contents: read

concurrency:
  group: preview-ui-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Check local preview in desktop and mobile browsers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies for checks
        run: npm ci
        working-directory: functions

      - name: Static check
        run: npm run check

      - name: Start local preview server
        shell: bash
        run: |
          python3 -m http.server 4173 --directory public > "$RUNNER_TEMP/local-preview.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/local-preview.pid"
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              echo "Local preview is ready."
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/local-preview.log"
          exit 1

      - name: Install Chromium smoke-test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Check preview UI
        run: node tools/check-preview-ui.cjs 'http://127.0.0.1:4173'

      - name: Upload local preview log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-preview-log
          path: ${{ runner.temp }}/local-preview.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload preview screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-ui-screenshots
          path: preview-screenshots
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local preview server
        if: always()
        shell: bash
        run: |
          if [ -s "$RUNNER_TEMP/local-preview.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/local-preview.pid")" 2>/dev/null || true
          fi
