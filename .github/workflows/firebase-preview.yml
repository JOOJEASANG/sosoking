name: Firebase Hosting Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/**'
      - 'tools/**'
      - '.github/workflows/firebase-preview.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: firebase-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Check preview in desktop and mobile browsers
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: sosoking-481e6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies for checks
        run: npm ci
        working-directory: functions

      - name: Static check
        run: npm run check

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOSOKING_481E6 }}
          project_id: ${{ env.FIREBASE_PROJECT_ID }}
          create_credentials_file: true
          export_environment_variables: true
          cleanup_credentials: true

      - name: Verify Firebase credentials
        run: |
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] || [ ! -s "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            echo "Google Cloud 인증 파일이 생성되지 않았습니다."
            exit 1
          fi
          node -e "const fs=require('fs');const p=process.env.GOOGLE_APPLICATION_CREDENTIALS;const j=JSON.parse(fs.readFileSync(p,'utf8'));if(!j.client_email||!j.private_key||!j.project_id)process.exit(1);console.log('Service account:',j.client_email,'Project:',j.project_id);"

      - name: Deploy Firebase Hosting preview
        id: preview
        shell: bash
        run: |
          set +e
          channel="pr-${{ github.event.pull_request.number }}-${{ github.run_number }}"
          output="$RUNNER_TEMP/firebase-preview.log"
          npx firebase-tools hosting:channel:deploy "$channel" \
            --expires 7d \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive \
            --json > "$output" 2>&1
          code=$?
          cat "$output"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" -ne 0 ]; then
            if grep -q "is the current active version" "$output"; then
              url="https://${FIREBASE_PROJECT_ID}.web.app"
              echo "Hosting 내용이 운영 버전과 동일하여 운영 기본 주소를 검사합니다."
            else
              exit "$code"
            fi
          else
            url=$(node -e "const fs=require('fs');const text=fs.readFileSync(process.argv[1],'utf8');const matches=text.match(/https:\/\/[^\"'\\s]+\.web\.app/g)||[];if(!matches.length)process.exit(1);console.log(matches[0]);" "$output")
          fi

          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Upload preview deployment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-preview-deploy-log
          path: ${{ runner.temp }}/firebase-preview.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Install Chromium smoke-test runtime
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Check preview UI
        run: node tools/check-preview-ui.cjs '${{ steps.preview.outputs.url }}'

      - name: Upload preview screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-ui-screenshots
          path: preview-screenshots
          if-no-files-found: ignore
          retention-days: 7
