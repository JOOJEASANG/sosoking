name: Check and Deploy Firebase Hosting

on:
  pull_request:
    branches:
      - main
    paths:
      - 'public/**'
      - 'functions/**'
      - 'tools/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'package.json'
      - 'package-lock.json'
      - 'functions/package.json'
      - 'functions/package-lock.json'
      - '.github/workflows/firebase-hosting.yml'
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'package-lock.json'
      - 'tools/**'
      - '.github/workflows/firebase-hosting.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-deploy:
    name: Check repository and deploy hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install functions dependencies for repository checks
        run: npm ci
        working-directory: functions
      - name: Run static check
        id: static_check
        shell: bash
        run: |
          set +e
          npm run check > static-check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload static check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-check-report
          path: static-check.log
          retention-days: 3
      - name: Enforce static check result
        if: steps.static_check.outputs.exit_code != '0'
        run: |
          cat static-check.log
          exit 1
      - name: Deploy Firebase Hosting
        if: github.event_name != 'pull_request'
        run: npx firebase-tools deploy --only hosting --project sosoking-481e6 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
