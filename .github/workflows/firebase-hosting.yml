name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/firebase-hosting.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-hosting:
    name: Deploy hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project sosoking-481e6 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
