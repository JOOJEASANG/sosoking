name: Apply logo package

on:
  push:
    paths:
      - 'sosoking_logo_package.zip'
      - '.github/workflows/apply-logo-package.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-logo-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Extract logo package into public assets
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f sosoking_logo_package.zip ]; then
            echo "sosoking_logo_package.zip not found in repository root" >&2
            exit 1
          fi
          rm -rf /tmp/sosoking_logo_package
          mkdir -p /tmp/sosoking_logo_package
          unzip -o sosoking_logo_package.zip -d /tmp/sosoking_logo_package
          if [ ! -d /tmp/sosoking_logo_package/public ]; then
            echo "The zip file does not contain a public/ folder" >&2
            find /tmp/sosoking_logo_package -maxdepth 3 -type f | sort
            exit 1
          fi
          mkdir -p public/icons
          rsync -a /tmp/sosoking_logo_package/public/ public/
          find public -maxdepth 3 \( -name 'app-icon.png' -o -name 'favicon.png' -o -name 'apple-touch-icon.png' -o -name 'site-logo-banner.png' -o -name 'logo-horizontal.png' -o -name 'favicon-16x16.png' -o -name 'favicon-32x32.png' -o -name 'apple-touch-icon-180.png' -o -name 'favicon.ico' -o -name 'icon-192.png' -o -name 'icon-512.png' \) -print | sort

      - name: Commit extracted logo assets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in \
            public/app-icon.png \
            public/favicon.png \
            public/apple-touch-icon.png \
            public/site-logo-banner.png \
            public/logo-horizontal.png \
            public/favicon-16x16.png \
            public/favicon-32x32.png \
            public/apple-touch-icon-180.png \
            public/favicon.ico \
            public/icons/icon-192.png \
            public/icons/icon-512.png; do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No logo asset changes to commit."
          else
            git commit -m "Apply logo package assets"
            git push
          fi
