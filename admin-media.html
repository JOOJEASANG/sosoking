<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>소소킹 미디어 관리자</title><style>body{margin:0;background:#fffdf8;color:#29251f;font-family:Arial,'Noto Sans KR',sans-serif}.wrap{max-width:1100px;margin:auto;padding:28px 18px}a{color:#29251f}.top{display:flex;justify-content:space-between;gap:20px;align-items:center}.panel{background:#fff;border:1px solid #ded5c7;border-radius:16px;padding:18px;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.card{border:1px solid #ded5c7;border-radius:14px;padding:15px}.card h2{margin:0 0 12px}.field{display:block;font-size:13px;font-weight:700;margin:10px 0}.field input,.field select{width:100%;box-sizing:border-box;margin-top:5px;padding:10px;border:1px solid #ded5c7;border-radius:8px}.preview{width:100%;aspect-ratio:16/9;background:#f4ecdd;border-radius:10px;display:grid;place-items:center;overflow:hidden}.preview img{width:100%;height:100%;object-fit:cover}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}button{border:0;border-radius:9px;padding:10px 14px;background:#29251f;color:#fff;font-weight:700;cursor:pointer}.save{background:#df653f}.hint{color:#756e64;font-size:12px;line-height:1.6}@media(max-width:760px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="wrap"><div class="top"><div><h1>이미지·유튜브 관리자</h1><p>자동 조사된 공식 후보를 검수하고 대표 미디어를 저장합니다.</p></div><div><a href="admin.html">기본정보 관리자</a> · <a href="index.html">사이트 보기</a></div></div><section class="panel"><div class="actions"><button id="save" class="save">브라우저 저장</button><button id="export">JSON 내보내기</button><button id="reset">초기 후보 복원</button></div><p class="hint">방송 화면 캡처나 블로그 이미지는 자동 등록하지 않습니다. 이미지 URL과 원문 출처가 모두 확인된 경우에만 공개 상태로 변경하세요.</p></section><section id="grid" class="grid"></section></main><script src="media-candidates.js"></script><script>const KEY='sosoking-media-v1',base=window.SOSOKING_MEDIA_CANDIDATES||{};let data=load();const grid=document.querySelector('#grid');function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(base)}catch{return structuredClone(base)}}function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function ytId(u){try{const x=new URL(u);if(x.hostname==='youtu.be')return x.pathname.slice(1);if(x.searchParams.get('v'))return x.searchParams.get('v');const m=x.pathname.match(/\/(embed|shorts)\/([^/?]+)/);return m?m[2]:''}catch{return''}}function render(){grid.innerHTML=Object.entries(data).map(([title,x],i)=>{const id=ytId(x.videoUrl),thumb=id?'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg':'';return `<article class="card" data-title="${esc(title)}"><h2>${esc(title)}</h2><div class="preview">${thumb?`<img src="${thumb}" alt="${esc(title)} 영상 썸네일">`:'공식 영상 후보 링크'}</div><label class="field">이미지 URL<input data-k="imageUrl" value="${esc(x.imageUrl)}"></label><label class="field">이미지 출처명<input data-k="imageSourceName" value="${esc(x.imageSourceName)}"></label><label class="field">이미지 원문 URL<input data-k="imageSourceUrl" value="${esc(x.imageSourceUrl)}"></label><label class="field">유튜브 URL<input data-k="videoUrl" value="${esc(x.videoUrl)}"></label><label class="field">채널명<input data-k="channelName" value="${esc(x.channelName)}"></label><label class="field">검수 상태<select data-k="status"><option value="needsReview" ${x.status==='needsReview'?'selected':''}>검수 필요</option><option value="official" ${x.status==='official'?'selected':''}>공식 출처 확인</option><option value="reviewed" ${x.status==='reviewed'?'selected':''}>관리자 확인 완료</option><option value="hidden" ${x.status==='hidden'?'selected':''}>비공개</option></select></label><p class="hint">${id?'직접 재생 가능한 유튜브 영상입니다.':'현재는 공식 채널 검색 후보입니다. 영상 1개를 선택해 직접 주소로 교체하세요.'}</p></article>`}).join('');document.querySelectorAll('.card').forEach(card=>card.querySelectorAll('[data-k]').forEach(el=>el.oninput=()=>{data[card.dataset.title][el.dataset.k]=el.value}))}document.querySelector('#save').onclick=()=>{localStorage.setItem(KEY,JSON.stringify(data));alert('저장했습니다.')};document.querySelector('#export').onclick=()=>{const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sosoking-media.json';a.click();URL.revokeObjectURL(a.href)};document.querySelector('#reset').onclick=()=>{if(confirm('초기 후보로 되돌릴까요?')){data=structuredClone(base);localStorage.removeItem(KEY);render()}};render();</script></body></html>
