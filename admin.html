<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>소소킹 관리자</title><style>:root{--bg:#f4efe7;--card:#fff;--ink:#292621;--muted:#746e66;--line:#ddd3c6;--accent:#ae4936}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,'Noto Sans KR',sans-serif}.wrap{max-width:1180px;margin:auto;padding:28px 18px 70px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.top a{color:var(--ink)}.status,.panel{background:#fff;border:1px solid var(--line);border-radius:18px}.status{padding:13px 16px;margin-bottom:18px}.panel{padding:20px}.login{max-width:420px;margin:50px auto}.layout{display:grid;grid-template-columns:390px 1fr;gap:20px}.field{display:block;font-size:13px;font-weight:700;margin-bottom:12px}.field input,.field textarea{display:block;width:100%;margin-top:6px;padding:11px;border:1px solid var(--line);border-radius:10px}.field textarea{min-height:105px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button,.login button{border:0;border-radius:10px;background:var(--ink);color:#fff;padding:11px 14px;font-weight:700;cursor:pointer}.actions .approve{background:#37654c}.actions .reject{background:#963f35}.proposal-list{display:grid;gap:10px}.proposal{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:13px}.proposal small{display:block;color:var(--muted);margin-top:5px}.proposal button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 11px}.reason{background:#f7f2eb;border-radius:10px;padding:12px;color:var(--muted);font-size:13px;min-height:42px}@media(max-width:820px){.layout{grid-template-columns:1fr}.row{grid-template-columns:1fr}}</style></head><body><main class="wrap"><div class="top"><div><h1>소소킹 관리자</h1><p>프로그램 직접 수정과 이용자 제안 승인을 관리합니다.</p></div><a href="index.html">← 사이트 보기</a></div><div id="status" class="status">관리자 로그인이 필요합니다.</div><section id="loginPanel" class="panel login"><h2>관리자 로그인</h2><form id="loginForm"><label class="field">이메일<input id="email" type="email" required></label><label class="field">비밀번호<input id="password" type="password" required></label><button>로그인</button></form></section><section id="adminPanel" hidden><div class="actions" style="justify-content:flex-end;margin-bottom:12px"><button id="logoutBtn">로그아웃</button></div><div class="layout"><section class="panel"><h2>프로그램 편집</h2><form id="editor"><label class="field">프로그램 ID<input id="programId" required placeholder="예: family-arcade"></label><label class="field">제목<input id="title" required maxlength="100"></label><label class="field">출연진·제작자<input id="people" maxlength="120"></label><label class="field">설명<textarea id="summary" required maxlength="700"></textarea></label><div class="row"><label class="field">이미지 URL<input id="imageUrl" type="url" maxlength="500"></label><label class="field">유튜브 URL<input id="youtubeUrl" type="url" maxlength="500"></label></div><p id="reasonView" class="reason"></p><div class="actions"><button type="submit">관리자 즉시 저장</button><button type="button" class="approve" id="approveBtn" disabled>제안 승인</button><button type="button" class="reject" id="rejectBtn" disabled>제안 반려</button><button type="button" id="newBtn">새로 입력</button></div></form></section><section class="panel"><h2>대기 중인 수정 제안</h2><div id="proposalList" class="proposal-list"></div></section></div></section></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="/__/firebase/init.js"></script><script src="assets/sosoking-admin-firestore.js?v=20260720-5"></script></body></html>
